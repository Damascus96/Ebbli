<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#131f10">
  <title>Ebbli</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="eb-popup">
    <!-- Header with gradient and master toggle -->
    <header class="eb-header">
      <div class="eb-header-content">
        <div class="eb-logo">
          <h1>Ebb<span class="eb-li">li</span></h1>
          <p class="eb-subtitle">Keep ChatGPT flow moving fast</p>
        </div>
        <!-- Master toggle in header -->
        <div class="eb-master-toggle">
          <input type="checkbox" id="enableToggle" class="eb-toggle-input" aria-label="Enable extension">
          <label for="enableToggle" class="eb-toggle-track">
            <span class="eb-toggle-thumb"></span>
          </label>
        </div>
      </div>
      <div class="eb-header-accent"></div>
    </header>

    <main class="eb-main">
      <!-- Card: Message Retention -->
      <section class="eb-card" id="retentionCard">
        <div class="eb-card-header">
          <span class="eb-card-title">Message Retention</span>
        </div>
        <div class="eb-card-content">
          <div class="eb-slider-container">
            <label class="eb-slider-header" for="keepSlider">
              <span class="eb-slider-label">Keep last</span>
              <span class="eb-slider-value" id="keepValue">10</span>
              <span class="eb-slider-label">messages</span>
            </label>
            <div class="eb-slider-track-wrapper">
              <input
                type="range"
                id="keepSlider"
                class="eb-slider"
                min="1"
                max="100"
                value="10"
                aria-label="Number of messages to keep"
                aria-valuemin="1"
                aria-valuemax="100"
                aria-valuenow="10"
              >
              <div class="eb-slider-track-fill" id="sliderTrackFill"></div>
            </div>
            <div class="eb-slider-labels">
              <span>1</span>
              <span>50</span>
              <span>100</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Card: Options -->
      <section class="eb-card" id="optionsCard">
        <div class="eb-card-header">
          <span class="eb-card-title">Options</span>
        </div>
        <div class="eb-card-content">
          <!-- Show Status Bar -->
          <label class="eb-checkbox-row">
            <div class="eb-checkbox-wrapper">
              <input type="checkbox" id="showStatusBarCheckbox" class="eb-checkbox-input" aria-label="Show status bar">
              <div class="eb-checkbox-box">
                <svg class="eb-checkbox-check" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <div class="eb-checkbox-label-group">
              <span class="eb-checkbox-label">Show status bar</span>
              <span class="eb-checkbox-description">Display trimming stats on page</span>
            </div>
          </label>

          <!-- Collapse long user messages -->
          <label class="eb-checkbox-row">
            <div class="eb-checkbox-wrapper">
              <input
                type="checkbox"
                id="collapseLongUserMessagesCheckbox"
                class="eb-checkbox-input"
                aria-label="Collapse long user messages"
              >
              <div class="eb-checkbox-box">
                <svg class="eb-checkbox-check" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <div class="eb-checkbox-label-group">
              <span class="eb-checkbox-label">Collapse long user messages</span>
              <span class="eb-checkbox-description">Reduce lag in long chats</span>
            </div>
          </label>

        </div>
      </section>

      <!-- Card: Debug (dev only) -->
      <section class="eb-card eb-card-debug" id="debugGroup" style="display: none;">
        <div class="eb-card-header">
          <span class="eb-card-title">Developer</span>
        </div>
        <div class="eb-card-content">
          <label class="eb-checkbox-row">
            <div class="eb-checkbox-wrapper">
              <input type="checkbox" id="debugCheckbox" class="eb-checkbox-input" aria-label="Enable debug logging">
              <div class="eb-checkbox-box">
                <svg class="eb-checkbox-check" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <div class="eb-checkbox-label-group">
              <span class="eb-checkbox-label">Debug mode</span>
              <span class="eb-checkbox-description">Show logs in console</span>
            </div>
          </label>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="eb-footer">
      <div id="status" class="eb-status" role="status" aria-live="polite"></div>
      <button class="eb-button-support" id="supportLink">
        <span class="eb-support-heart">❤</span>
        <span>Support Development</span>
      </button>
      <span class="eb-version" id="version"></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
